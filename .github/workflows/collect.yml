name: collect weekly data

on:
  schedule:
    - cron: '0 0 * * 0'

  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install deps
        run: npm ci


      - name: run collectors
        run: npx tsx scripts/collect.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # commit whatever files were written and push back to main
      - name: commit new data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add weekly-data/
          git diff --staged --quiet || git commit -m "weekly data for $(date +%Y-%m-%d)"
          git push